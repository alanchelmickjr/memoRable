AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  MemoRable GPU Spot Instance — LoRA service for doc-to-lora internalization.
  Hard-capped at $50/month via AWS Budgets auto-stop.
  Spot pricing keeps hourly cost ~80% below on-demand.
  Spins up on demand, internalizes documents, shuts itself down when idle.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "GPU Instance"
        Parameters:
          - InstanceType
          - KeyName
          - SpotMaxPrice
      - Label:
          default: "Budget"
        Parameters:
          - MonthlyBudgetLimit
          - AlertEmail
      - Label:
          default: "Auto-Shutdown"
        Parameters:
          - IdleShutdownMinutes
      - Label:
          default: "Source"
        Parameters:
          - GitHubRepo
          - GitHubBranch

Parameters:
  GitHubRepo:
    Type: String
    Default: https://github.com/alanchelmickjr/memoRable.git
    Description: GitHub repository URL

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to deploy

  InstanceType:
    Type: String
    Default: g4dn.xlarge
    AllowedValues:
      - g4dn.xlarge    # T4 16GB — ~$0.16/hr spot (~$0.53 on-demand)
      - g4dn.2xlarge   # T4 16GB + more CPU/RAM — ~$0.24/hr spot
      - g5.xlarge      # A10G 24GB — ~$0.40/hr spot
    Description: >-
      GPU instance type. g4dn.xlarge (T4, 16GB VRAM) fits Gemma 2 2B.
      At ~$0.16/hr spot, $50 buys ~312 hours.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for access (required for debugging)

  SpotMaxPrice:
    Type: String
    Default: '0.20'
    Description: >-
      Max hourly spot bid in USD. Set just above typical spot price.
      g4dn.xlarge spot is ~$0.16/hr. Default $0.20 gives headroom.

  MonthlyBudgetLimit:
    Type: Number
    Default: 50
    MinValue: 5
    MaxValue: 500
    Description: >-
      Hard monthly budget cap in USD. AWS Budgets will stop the instance
      when this threshold is reached. Default: $50.

  AlertEmail:
    Type: String
    Default: ''
    Description: >-
      Email for budget alerts (80% and 100% of limit).
      Leave blank to skip email alerts — auto-stop still works.

  IdleShutdownMinutes:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 1440
    Description: >-
      Auto-shutdown after N minutes with no /internalize calls.
      Default: 30 min. Prevents runaway costs from forgotten instances.

Resources:
  # ============================================
  # VPC & Networking (minimal)
  # ============================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: memorable-gpu-vpc

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: memorable-gpu-subnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  # ============================================
  # Security Group — port 8090 only
  # ============================================
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MemoRable GPU LoRA service
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8090
          ToPort: 8090
          CidrIp: 0.0.0.0/0
          Description: LoRA service API
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (restrict in production)

  # ============================================
  # IAM Role — S3 for weights, Budgets for self-stop
  # ============================================
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: LoraWeightsS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::memorable-lora*
                  - arn:aws:s3:::memorable-lora*/*
        - PolicyName: SelfStop
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:StopInstances
                Resource: '*'
                Condition:
                  StringEquals:
                    ec2:ResourceTag/aws:cloudformation:stack-id: !Ref AWS::StackId

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ============================================
  # Spot Instance — the GPU box
  # ============================================
  SpotInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      # Deep Learning AMI (Ubuntu) — comes with NVIDIA drivers + Docker
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      InstanceMarketOptions:
        MarketType: spot
        SpotOptions:
          MaxPrice: !Ref SpotMaxPrice
          SpotInstanceType: persistent
          InstanceInterruptionBehavior: stop
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: memorable-gpu-lora
        - Key: Project
          Value: memorable
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/memorable-gpu-init.log 2>&1

          echo "=== MemoRable GPU Init ==="

          # Install Docker if not present (DL AMI may already have it)
          if ! command -v docker &>/dev/null; then
            curl -fsSL https://get.docker.com | sh
            systemctl enable docker && systemctl start docker
          fi

          # Install NVIDIA Container Toolkit
          if ! command -v nvidia-ctk &>/dev/null; then
            distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
            curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
            curl -s -L "https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list" | \
              sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
              tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
            apt-get update && apt-get install -y nvidia-container-toolkit
            nvidia-ctk runtime configure --runtime=docker
            systemctl restart docker
          fi

          # Clone repo
          cd /opt
          git clone --branch ${GitHubBranch} ${GitHubRepo} memorable
          cd memorable
          git submodule init && git submodule update

          # Build and run LoRA service with GPU
          cd src/services/lora_service
          docker build -t memorable-lora .
          docker run -d \
            --name memorable-lora \
            --gpus all \
            -p 8090:8090 \
            -v lora-weights:/data/weights \
            -v /opt/memorable/vendors/doc-to-lora:/app/vendors/doc-to-lora:ro \
            -e LORA_DEVICE=cuda \
            -e LORA_STORAGE_BACKEND=s3 \
            -e LORA_S3_BUCKET=memorable-lora \
            --restart unless-stopped \
            memorable-lora

          # Auto-shutdown when idle
          cat > /usr/local/bin/idle-shutdown.sh << 'IDLE_EOF'
          #!/bin/bash
          IDLE_LIMIT=${IdleShutdownMinutes}
          LOG="/var/log/memorable-lora-idle.log"
          while true; do
            sleep 60
            # Check if any /internalize calls in the last N minutes
            LAST_CALL=$(docker logs memorable-lora --since "${IDLE_LIMIT}m" 2>&1 | grep -c "POST /internalize" || true)
            LAST_GEN=$(docker logs memorable-lora --since "${IDLE_LIMIT}m" 2>&1 | grep -c "POST /generate" || true)
            if [ "$LAST_CALL" -eq 0 ] && [ "$LAST_GEN" -eq 0 ]; then
              echo "$(date): No activity for ${IDLE_LIMIT} min, stopping instance" >> $LOG
              INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
              REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
              aws ec2 stop-instances --instance-ids $INSTANCE_ID --region $REGION
              exit 0
            fi
          done
          IDLE_EOF
          chmod +x /usr/local/bin/idle-shutdown.sh

          # Run idle monitor as systemd service
          cat > /etc/systemd/system/lora-idle-shutdown.service << 'SVC_EOF'
          [Unit]
          Description=MemoRable LoRA idle auto-shutdown
          After=docker.service

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/idle-shutdown.sh
          Restart=always

          [Install]
          WantedBy=multi-user.target
          SVC_EOF
          systemctl enable lora-idle-shutdown && systemctl start lora-idle-shutdown

          echo "=== MemoRable GPU Ready ==="

  # ============================================
  # Elastic IP — stable address across stop/start
  # ============================================
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref SpotInstance
      AllocationId: !GetAtt ElasticIP.AllocationId

  # ============================================
  # S3 Bucket — LoRA weight storage
  # ============================================
  WeightsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'memorable-lora-${AWS::AccountId}-${AWS::Region}'
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldWeights
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: memorable

  # ============================================
  # Budget — the $50 hard cap
  # ============================================
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: memorable-gpu-monthly
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetLimit
          Unit: USD
        CostFilters:
          TagKeyValue:
            - !Sub 'user:Project$memorable'
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !If [HasAlertEmail, !Ref AlertEmail, !Ref 'AWS::NoValue']
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !If [HasAlertEmail, !Ref AlertEmail, !Ref 'AWS::NoValue']

# ============================================
# AMI Map — Deep Learning AMI (Ubuntu, NVIDIA)
# ============================================
Mappings:
  RegionAMI:
    us-west-2:
      AMI: ami-0a7c4d84e6b0760b4  # Deep Learning OSS Nvidia Driver AMI GPU PyTorch 2.5 (Ubuntu 22.04)
    us-west-1:
      AMI: ami-0a7c4d84e6b0760b4  # Update with region-specific AMI
    us-east-1:
      AMI: ami-0a7c4d84e6b0760b4  # Update with region-specific AMI

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Outputs:
  LoRAServiceURL:
    Description: LoRA service endpoint
    Value: !Sub 'http://${ElasticIP}:8090'

  InternalizeEndpoint:
    Description: POST documents here to internalize
    Value: !Sub 'http://${ElasticIP}:8090/internalize'

  HealthCheck:
    Description: Health check endpoint
    Value: !Sub 'http://${ElasticIP}:8090/health'

  InstanceId:
    Description: EC2 instance ID (for start/stop)
    Value: !Ref SpotInstance

  WeightsBucket:
    Description: S3 bucket for LoRA weights
    Value: !Ref WeightsBucket

  MonthlyBudget:
    Description: Monthly budget limit
    Value: !Sub '${MonthlyBudgetLimit} USD/month hard cap'

  StartCommand:
    Description: Start the GPU instance when you need it
    Value: !Sub 'aws ec2 start-instances --instance-ids ${SpotInstance} --region ${AWS::Region}'

  StopCommand:
    Description: Stop the GPU instance when done
    Value: !Sub 'aws ec2 stop-instances --instance-ids ${SpotInstance} --region ${AWS::Region}'

  CostEstimate:
    Description: Estimated cost breakdown
    Value: !Sub >-
      Spot ~$0.16/hr (${InstanceType}) + $3.65/mo (EIP when stopped) + S3 pennies.
      At $0.16/hr, $50 buys ~290 hours of GPU time.
      Auto-shutdown after ${IdleShutdownMinutes} min idle.
